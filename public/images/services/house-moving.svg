<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#C8E6F7"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CB87A"/>
      <stop offset="100%" stop-color="#5A9B58"/>
    </linearGradient>
    <linearGradient id="vanBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2463"/>
      <stop offset="100%" stop-color="#061539"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4896A"/>
      <stop offset="100%" stop-color="#C4784A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="360" height="240" fill="url(#sky)"/>

  <!-- Clouds -->
  <ellipse cx="60" cy="40" rx="30" ry="14" fill="white" opacity="0.8"/>
  <ellipse cx="85" cy="33" rx="22" ry="12" fill="white" opacity="0.8"/>
  <ellipse cx="40" cy="45" rx="18" ry="10" fill="white" opacity="0.7"/>

  <ellipse cx="270" cy="55" rx="25" ry="11" fill="white" opacity="0.7"/>
  <ellipse cx="295" cy="48" rx="18" ry="9" fill="white" opacity="0.7"/>

  <!-- Ground -->
  <rect x="0" y="175" width="360" height="65" fill="url(#ground)"/>
  <!-- Path/driveway -->
  <polygon points="120,240 180,240 170,175 130,175" fill="#C8B89A" opacity="0.8"/>

  <!-- === HOUSE === -->
  <!-- House side wall (shadow side) -->
  <rect x="200" y="110" width="30" height="70" fill="#B8724A"/>

  <!-- House front wall -->
  <rect x="140" y="110" width="60" height="70" fill="url(#wall)"/>

  <!-- Brick pattern on front wall -->
  <g opacity="0.15" stroke="#7A4020" stroke-width="0.5" fill="none">
    <line x1="140" y1="120" x2="200" y2="120"/>
    <line x1="140" y1="130" x2="200" y2="130"/>
    <line x1="140" y1="140" x2="200" y2="140"/>
    <line x1="140" y1="150" x2="200" y2="150"/>
    <line x1="140" y1="160" x2="200" y2="160"/>
    <line x1="165" y1="115" x2="165" y2="175"/>
    <line x1="155" y1="125" x2="155" y2="135"/>
    <line x1="175" y1="125" x2="175" y2="135"/>
    <line x1="155" y1="145" x2="155" y2="155"/>
    <line x1="175" y1="145" x2="175" y2="155"/>
  </g>

  <!-- Roof main -->
  <polygon points="133,112 170,78 207,112" fill="url(#roof)" filter="url(#shadow)"/>
  <!-- Roof ridge line -->
  <line x1="133" y1="112" x2="207" y2="112" stroke="#6B3410" stroke-width="2"/>

  <!-- Chimney -->
  <rect x="183" y="85" width="10" height="22" fill="#9B5030"/>
  <rect x="181" y="83" width="14" height="4" fill="#7A3A20"/>

  <!-- Left window -->
  <rect x="147" y="120" width="22" height="20" rx="1" fill="#B8D4E8"/>
  <rect x="147" y="120" width="22" height="20" rx="1" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="158" y1="120" x2="158" y2="140" stroke="#8B6914" stroke-width="1"/>
  <line x1="147" y1="130" x2="169" y2="130" stroke="#8B6914" stroke-width="1"/>

  <!-- Right window -->
  <rect x="178" y="120" width="17" height="20" rx="1" fill="#B8D4E8"/>
  <rect x="178" y="120" width="17" height="20" rx="1" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="186" y1="120" x2="186" y2="140" stroke="#8B6914" stroke-width="1"/>
  <line x1="178" y1="130" x2="195" y2="130" stroke="#8B6914" stroke-width="1"/>

  <!-- Front door -->
  <rect x="158" y="150" width="24" height="30" rx="2" fill="#8B3A3A"/>
  <rect x="160" y="152" width="9" height="12" rx="1" fill="#A85050" opacity="0.6"/>
  <rect x="171" y="152" width="9" height="12" rx="1" fill="#A85050" opacity="0.6"/>
  <circle cx="179" cy="168" r="2" fill="#D4AF37"/>

  <!-- Upstairs windows -->
  <rect x="148" y="90" width="19" height="16" rx="1" fill="#B8D4E8"/>
  <rect x="148" y="90" width="19" height="16" rx="1" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="157" y1="90" x2="157" y2="106" stroke="#8B6914" stroke-width="1"/>

  <rect x="174" y="90" width="19" height="16" rx="1" fill="#B8D4E8"/>
  <rect x="174" y="90" width="19" height="16" rx="1" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="183" y1="90" x2="183" y2="106" stroke="#8B6914" stroke-width="1"/>

  <!-- === MOVING VAN === -->
  <!-- Van body -->
  <rect x="22" y="138" width="105" height="50" rx="3" fill="url(#vanBody)" filter="url(#shadow)"/>
  <!-- Van cab -->
  <rect x="97" y="148" width="30" height="40" rx="3" fill="#0E2E7A"/>

  <!-- Windscreen -->
  <rect x="100" y="152" width="24" height="18" rx="2" fill="#B8D4E8" opacity="0.85"/>
  <line x1="112" y1="152" x2="112" y2="170" stroke="#9ABFDB" stroke-width="0.8"/>

  <!-- Gold stripe on van -->
  <rect x="22" y="155" width="105" height="5" fill="#D4AF37" opacity="0.9"/>

  <!-- "FAST MAN & VAN" text on van -->
  <text x="62" y="152" font-family="system-ui,Arial,sans-serif" font-size="7" font-weight="800" fill="#D4AF37" text-anchor="middle" letter-spacing="0.5">FAST MAN &amp; VAN</text>

  <!-- Van rear door lines -->
  <line x1="60" y1="138" x2="60" y2="188" stroke="#1B3A8C" stroke-width="1.5"/>
  <line x1="22" y1="163" x2="97" y2="163" stroke="#1B3A8C" stroke-width="1"/>

  <!-- Wheels -->
  <circle cx="45" cy="190" r="13" fill="#1A1A2E"/>
  <circle cx="45" cy="190" r="9" fill="#2A2A4E"/>
  <circle cx="45" cy="190" r="4" fill="#D4AF37"/>
  <circle cx="107" cy="190" r="13" fill="#1A1A2E"/>
  <circle cx="107" cy="190" r="9" fill="#2A2A4E"/>
  <circle cx="107" cy="190" r="4" fill="#D4AF37"/>

  <!-- Boxes on path -->
  <rect x="127" y="157" width="16" height="14" rx="1" fill="#D4A96A"/>
  <rect x="127" y="157" width="16" height="14" rx="1" fill="none" stroke="#B8894A" stroke-width="1"/>
  <line x1="135" y1="157" x2="135" y2="171" stroke="#B8894A" stroke-width="0.8"/>
  <line x1="127" y1="164" x2="143" y2="164" stroke="#B8894A" stroke-width="0.8"/>

  <rect x="130" y="170" width="18" height="15" rx="1" fill="#C49050"/>
  <rect x="130" y="170" width="18" height="15" rx="1" fill="none" stroke="#A87040" stroke-width="1"/>

  <!-- Person silhouette -->
  <circle cx="255" cy="158" r="7" fill="#5A3A2A"/>
  <rect x="250" y="165" width="10" height="18" rx="2" fill="#2C4A8C"/>
  <line x1="250" y1="170" x2="243" y2="180" stroke="#5A3A2A" stroke-width="3" stroke-linecap="round"/>
  <line x1="260" y1="170" x2="263" y2="178" stroke="#5A3A2A" stroke-width="3" stroke-linecap="round"/>

  <!-- Gate/fence posts -->
  <rect x="120" y="168" width="4" height="16" rx="1" fill="#8B7355"/>
  <rect x="136" y="168" width="4" height="16" rx="1" fill="#8B7355"/>
  <line x1="120" y1="173" x2="140" y2="173" stroke="#8B7355" stroke-width="1.5"/>

  <!-- Flowers/garden details -->
  <circle cx="300" cy="178" r="3" fill="#E8A0B0"/>
  <circle cx="310" cy="175" r="2.5" fill="#F0B0C0"/>
  <circle cx="320" cy="179" r="2" fill="#E8A0B0"/>
  <rect x="299" y="178" width="2" height="8" fill="#5A9B58"/>
  <rect x="309" y="175" width="2" height="10" fill="#5A9B58"/>

  <!-- Hedge/bush -->
  <ellipse cx="280" cy="177" rx="18" ry="8" fill="#4A8A48"/>
  <ellipse cx="268" cy="179" rx="12" ry="7" fill="#5A9A58"/>
  <ellipse cx="290" cy="179" rx="10" ry="6" fill="#4A8A48"/>
</svg>
