<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE8D8"/>
      <stop offset="60%" stop-color="#FCEEE0"/>
      <stop offset="100%" stop-color="#F5D5B0"/>
    </linearGradient>
    <linearGradient id="road3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9AA0A8"/>
      <stop offset="100%" stop-color="#787E88"/>
    </linearGradient>
    <linearGradient id="van3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2463"/>
      <stop offset="100%" stop-color="#061539"/>
    </linearGradient>
    <linearGradient id="sofa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6F5E"/>
      <stop offset="100%" stop-color="#6B4F3E"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD080"/>
      <stop offset="100%" stop-color="#FFA030"/>
    </linearGradient>
  </defs>

  <!-- Warm afternoon sky -->
  <rect width="360" height="240" fill="url(#sky3)"/>

  <!-- Sun -->
  <circle cx="290" cy="45" r="28" fill="url(#sun)" opacity="0.7"/>
  <circle cx="290" cy="45" r="22" fill="#FFE090" opacity="0.5"/>

  <!-- Warm clouds -->
  <ellipse cx="80" cy="35" rx="35" ry="15" fill="#FFF5E8" opacity="0.85"/>
  <ellipse cx="110" cy="27" rx="25" ry="13" fill="#FFF5E8" opacity="0.85"/>
  <ellipse cx="55" cy="40" rx="20" ry="10" fill="#FFF8EE" opacity="0.75"/>

  <!-- Houses in background -->
  <!-- House 1 -->
  <rect x="230" y="110" width="55" height="75" fill="#D4896A" opacity="0.6"/>
  <polygon points="225,112 257,85 290,112" fill="#8B4513" opacity="0.6"/>
  <rect x="242" y="130" width="14" height="14" fill="#B8D4E8" opacity="0.6"/>
  <rect x="262" y="130" width="14" height="14" fill="#B8D4E8" opacity="0.6"/>
  <rect x="248" y="155" width="18" height="30" fill="#8B3A3A" opacity="0.6"/>
  <!-- House 2 -->
  <rect x="290" y="120" width="50" height="65" fill="#C8A870" opacity="0.5"/>
  <polygon points="286,122 315,98 344,122" fill="#7A5020" opacity="0.5"/>

  <!-- Trees -->
  <rect x="215" y="150" width="5" height="40" fill="#6B4520"/>
  <ellipse cx="217" cy="142" rx="14" ry="16" fill="#4A8A48"/>
  <ellipse cx="210" cy="150" rx="10" ry="12" fill="#5A9A58"/>

  <rect x="330" y="155" width="4" height="35" fill="#6B4520"/>
  <ellipse cx="332" cy="148" rx="12" ry="14" fill="#4A8A48"/>

  <!-- Road/pavement -->
  <rect x="0" y="190" width="360" height="50" fill="url(#road3)"/>
  <rect x="0" y="190" width="360" height="3" fill="#888E98"/>
  <!-- Pavement markings -->
  <rect x="50" y="205" width="25" height="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="90" y="205" width="25" height="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="290" y="205" width="25" height="4" fill="#FFFFFF" opacity="0.4"/>
  <rect x="330" y="205" width="25" height="4" fill="#FFFFFF" opacity="0.4"/>

  <!-- Lawn/garden strip -->
  <rect x="0" y="182" width="360" height="12" fill="#7CB87A"/>

  <!-- === LARGE VAN (open rear) === -->
  <!-- Van body -->
  <rect x="10" y="140" width="125" height="55" rx="3" fill="url(#van3)"/>
  <!-- Van cab -->
  <rect x="108" y="148" width="35" height="47" rx="3" fill="#0E2E7A"/>
  <!-- Windscreen -->
  <rect x="112" y="153" width="27" height="19" rx="2" fill="#6A9AC0" opacity="0.85"/>
  <line x1="125" y1="153" x2="125" y2="172" stroke="#5A8AB0" stroke-width="0.8"/>
  <!-- Gold stripe -->
  <rect x="10" y="158" width="125" height="5" fill="#D4AF37" opacity="0.95"/>
  <!-- Van text -->
  <text x="62" y="155" font-family="system-ui,Arial,sans-serif" font-size="7" font-weight="800" fill="#D4AF37" text-anchor="middle" letter-spacing="0.4">FAST MAN &amp; VAN</text>
  <!-- Rear doors open -->
  <rect x="10" y="140" width="8" height="55" rx="1" fill="#1B3A8C" transform="rotate(-75, 10, 140)"/>
  <!-- Door line on van -->
  <line x1="60" y1="140" x2="60" y2="195" stroke="#1B3A8C" stroke-width="1.5"/>
  <line x1="10" y1="167" x2="108" y2="167" stroke="#1B3A8C" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="35" cy="197" r="13" fill="#1A1A2E"/>
  <circle cx="35" cy="197" r="8.5" fill="#2A2A4E"/>
  <circle cx="35" cy="197" r="4" fill="#D4AF37"/>
  <circle cx="100" cy="197" r="13" fill="#1A1A2E"/>
  <circle cx="100" cy="197" r="8.5" fill="#2A2A4E"/>
  <circle cx="100" cy="197" r="4" fill="#D4AF37"/>

  <!-- === SOFA (being delivered) === -->
  <!-- Sofa base/seat -->
  <rect x="148" y="158" width="65" height="22" rx="4" fill="url(#sofa)"/>
  <!-- Sofa back -->
  <rect x="148" y="142" width="65" height="20" rx="4" fill="#7A5F4E"/>
  <!-- Sofa cushions -->
  <rect x="151" y="145" width="27" height="16" rx="3" fill="#9A7F6E"/>
  <rect x="183" y="145" width="27" height="16" rx="3" fill="#9A7F6E"/>
  <!-- Sofa arms -->
  <rect x="144" y="148" width="10" height="30" rx="3" fill="#7A5F4E"/>
  <rect x="207" y="148" width="10" height="30" rx="3" fill="#7A5F4E"/>
  <!-- Sofa legs -->
  <rect x="151" y="178" width="5" height="8" rx="1" fill="#5A4030"/>
  <rect x="205" y="178" width="5" height="8" rx="1" fill="#5A4030"/>

  <!-- Delivery person -->
  <circle cx="225" cy="158" r="7" fill="#6A4A30"/>
  <rect x="220" y="165" width="10" height="20" rx="2" fill="#0A2463"/>
  <!-- Arms extending to sofa -->
  <line x1="220" y1="170" x2="213" y2="168" stroke="#6A4A30" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="230" y1="170" x2="237" y2="165" stroke="#6A4A30" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="223" y1="185" x2="218" y2="197" stroke="#0A2463" stroke-width="3" stroke-linecap="round"/>
  <line x1="227" y1="185" x2="228" y2="197" stroke="#0A2463" stroke-width="3" stroke-linecap="round"/>

  <!-- Second person -->
  <circle cx="138" cy="160" r="6.5" fill="#4A3020"/>
  <rect x="134" y="167" width="9" height="18" rx="2" fill="#1B3A8C"/>
  <line x1="134" y1="172" x2="127" y2="168" stroke="#4A3020" stroke-width="3" stroke-linecap="round"/>
  <line x1="143" y1="172" x2="148" y2="165" stroke="#4A3020" stroke-width="3" stroke-linecap="round"/>

  <!-- Small box on ground -->
  <rect x="245" y="172" width="20" height="16" rx="1" fill="#D4A86A"/>
  <rect x="245" y="172" width="20" height="16" rx="1" fill="none" stroke="#B8884A" stroke-width="1"/>
  <line x1="255" y1="172" x2="255" y2="188" stroke="#B8884A" stroke-width="0.8"/>
  <line x1="245" y1="180" x2="265" y2="180" stroke="#B8884A" stroke-width="0.8"/>

  <!-- Wrapped item (lamp or mirror) -->
  <rect x="268" y="155" width="12" height="35" rx="2" fill="#C8C0A8"/>
  <line x1="268" y1="165" x2="280" y2="165" stroke="#A8A090" stroke-width="1"/>
  <line x1="268" y1="175" x2="280" y2="175" stroke="#A8A090" stroke-width="1"/>
  <line x1="268" y1="185" x2="280" y2="185" stroke="#A8A090" stroke-width="1"/>
</svg>
