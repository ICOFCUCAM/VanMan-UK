<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E0F8"/>
      <stop offset="100%" stop-color="#D0C4F0"/>
    </linearGradient>
    <linearGradient id="campus" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B7BAB"/>
      <stop offset="100%" stop-color="#7A6A9A"/>
    </linearGradient>
    <linearGradient id="campusSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6A5A8A"/>
      <stop offset="100%" stop-color="#7A6A9A"/>
    </linearGradient>
    <linearGradient id="van4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2463"/>
      <stop offset="100%" stop-color="#061539"/>
    </linearGradient>
    <linearGradient id="grass4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CB87A"/>
      <stop offset="100%" stop-color="#5A9A58"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="360" height="240" fill="url(#sky4)"/>

  <!-- Clouds -->
  <ellipse cx="50" cy="30" rx="28" ry="13" fill="white" opacity="0.75"/>
  <ellipse cx="72" cy="23" rx="20" ry="11" fill="white" opacity="0.75"/>
  <ellipse cx="300" cy="40" rx="22" ry="10" fill="white" opacity="0.65"/>

  <!-- === UNIVERSITY BUILDING === -->
  <!-- Main block -->
  <rect x="110" y="55" width="145" height="135" fill="url(#campus)"/>
  <!-- Side wing right -->
  <rect x="250" y="80" width="20" height="110" fill="url(#campusSide)"/>
  <!-- Side wing left -->
  <rect x="95" y="80" width="20" height="110" fill="url(#campusSide)"/>
  <!-- Roof parapet -->
  <rect x="93" y="50" width="179" height="10" rx="1" fill="#5A4A7A"/>
  <!-- Tower/spire -->
  <rect x="172" y="18" width="22" height="40" fill="#6A5A8A"/>
  <polygon points="164,22 183,5 202,22" fill="#4A3A6A"/>
  <!-- Clock face -->
  <circle cx="183" cy="35" r="8" fill="#E8E0F8"/>
  <circle cx="183" cy="35" r="6.5" fill="white"/>
  <line x1="183" y1="35" x2="183" y2="29" stroke="#4A3A6A" stroke-width="1.5"/>
  <line x1="183" y1="35" x2="187" y2="35" stroke="#4A3A6A" stroke-width="1.5"/>

  <!-- Windows on building -->
  <g fill="#B8D4E8" opacity="0.7">
    <!-- Ground floor -->
    <rect x="120" y="140" width="18" height="20"/>
    <rect x="145" y="140" width="18" height="20"/>
    <rect x="170" y="140" width="18" height="20"/>
    <rect x="195" y="140" width="18" height="20"/>
    <rect x="220" y="140" width="18" height="20"/>
    <rect x="245" y="140" width="10" height="20"/>
    <!-- Second floor -->
    <rect x="120" y="112" width="18" height="20"/>
    <rect x="145" y="112" width="18" height="20"/>
    <rect x="170" y="112" width="18" height="20"/>
    <rect x="195" y="112" width="18" height="20"/>
    <rect x="220" y="112" width="18" height="20"/>
    <rect x="245" y="112" width="10" height="20"/>
    <!-- Third floor -->
    <rect x="120" y="84" width="18" height="18"/>
    <rect x="145" y="84" width="18" height="18"/>
    <rect x="170" y="84" width="18" height="18"/>
    <rect x="195" y="84" width="18" height="18"/>
    <rect x="220" y="84" width="18" height="18"/>
  </g>

  <!-- Window cross-bars -->
  <g stroke="#9AB4C8" stroke-width="0.6" opacity="0.5">
    <line x1="129" y1="140" x2="129" y2="160"/><line x1="120" y1="150" x2="138" y2="150"/>
    <line x1="154" y1="140" x2="154" y2="160"/><line x1="145" y1="150" x2="163" y2="150"/>
    <line x1="179" y1="140" x2="179" y2="160"/><line x1="170" y1="150" x2="188" y2="150"/>
    <line x1="129" y1="112" x2="129" y2="132"/><line x1="120" y1="122" x2="138" y2="122"/>
    <line x1="179" y1="112" x2="179" y2="132"/><line x1="170" y1="122" x2="188" y2="122"/>
  </g>

  <!-- Main entrance arch -->
  <rect x="172" y="170" width="24" height="22" rx="0" fill="#4A3A6A"/>
  <ellipse cx="184" cy="170" rx="12" ry="6" fill="#4A3A6A"/>
  <ellipse cx="184" cy="170" rx="9" ry="4.5" fill="#7A6A9A" opacity="0.5"/>

  <!-- Pillars -->
  <rect x="167" y="155" width="6" height="35" fill="#7A6A9A"/>
  <rect x="195" y="155" width="6" height="35" fill="#7A6A9A"/>
  <rect x="165" y="153" width="10" height="4" rx="1" fill="#5A4A7A"/>
  <rect x="193" y="153" width="10" height="4" rx="1" fill="#5A4A7A"/>

  <!-- Grass -->
  <rect x="0" y="188" width="360" height="52" fill="url(#grass4)"/>
  <!-- Path to building -->
  <polygon points="165,240 205,240 198,188 172,188" fill="#C8B89A" opacity="0.8"/>

  <!-- === VAN === -->
  <rect x="10" y="148" width="95" height="48" rx="3" fill="url(#van4)"/>
  <rect x="82" y="156" width="28" height="40" rx="2" fill="#0E2E7A"/>
  <rect x="85" y="160" width="22" height="16" rx="2" fill="#7A9ABA" opacity="0.85"/>
  <rect x="10" y="162" width="95" height="5" fill="#D4AF37" opacity="0.95"/>
  <text x="50" y="158" font-family="system-ui,Arial,sans-serif" font-size="6.5" font-weight="800" fill="#D4AF37" text-anchor="middle" letter-spacing="0.3">FAST MAN &amp; VAN</text>
  <!-- Van door -->
  <line x1="47" y1="148" x2="47" y2="196" stroke="#1B3A8C" stroke-width="1.5"/>
  <!-- Wheels -->
  <circle cx="28" cy="199" r="12" fill="#1A1A2E"/>
  <circle cx="28" cy="199" r="7.5" fill="#2A2A4E"/>
  <circle cx="28" cy="199" r="3.5" fill="#D4AF37"/>
  <circle cx="85" cy="199" r="12" fill="#1A1A2E"/>
  <circle cx="85" cy="199" r="7.5" fill="#2A2A4E"/>
  <circle cx="85" cy="199" r="3.5" fill="#D4AF37"/>

  <!-- Student with boxes -->
  <!-- Student 1 -->
  <circle cx="120" cy="175" r="7" fill="#D4A870"/>
  <!-- Mortarboard hat -->
  <rect x="113" y="167" width="14" height="3" rx="1" fill="#2A1A4A"/>
  <rect x="115" y="164" width="10" height="5" rx="1" fill="#2A1A4A"/>
  <line x1="121" y1="164" x2="125" y2="162" stroke="#D4AF37" stroke-width="1.2"/>
  <circle cx="125" cy="161" r="2" fill="#D4AF37"/>
  <!-- Body -->
  <rect x="115" y="182" width="10" height="18" rx="2" fill="#7B2D8B"/>
  <!-- Holding box -->
  <rect x="107" y="183" width="14" height="11" rx="1" fill="#D4A860"/>
  <line x1="115" y1="182" x2="108" y2="184" stroke="#D4A870" stroke-width="3" stroke-linecap="round"/>
  <line x1="125" y1="182" x2="121" y2="184" stroke="#D4A870" stroke-width="3" stroke-linecap="round"/>

  <!-- Student 2 -->
  <circle cx="148" cy="178" r="6.5" fill="#C8A060"/>
  <!-- Simple hat -->
  <rect x="141" y="171" width="13" height="2.5" rx="1" fill="#1A0A2A"/>
  <rect x="143" y="168" width="9" height="4.5" rx="1" fill="#1A0A2A"/>
  <line x1="149" y1="168" x2="152" y2="166" stroke="#D4AF37" stroke-width="1"/>
  <circle cx="152" cy="165" r="1.8" fill="#D4AF37"/>
  <rect x="143" y="185" width="9" height="16" rx="2" fill="#5B1A8A"/>
  <line x1="143" y1="189" x2="137" y2="193" stroke="#C8A060" stroke-width="3" stroke-linecap="round"/>
  <line x1="152" y1="189" x2="155" y2="195" stroke="#C8A060" stroke-width="3" stroke-linecap="round"/>

  <!-- Stack of boxes on ground -->
  <rect x="163" y="183" width="20" height="16" rx="1" fill="#D4A870"/>
  <rect x="163" y="183" width="20" height="16" rx="1" fill="none" stroke="#B8884A" stroke-width="1"/>
  <rect x="165" y="198" width="24" height="15" rx="1" fill="#C8A060"/>
  <text x="173" y="193" font-family="system-ui,sans-serif" font-size="4" fill="#8A6430" text-anchor="middle">BOOKS</text>

  <!-- 10% badge -->
  <circle cx="330" cy="55" r="28" fill="#7B2D8B" opacity="0.9"/>
  <circle cx="330" cy="55" r="24" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="330" y="50" font-family="system-ui,Arial,sans-serif" font-size="11" font-weight="900" fill="white" text-anchor="middle">10%</text>
  <text x="330" y="63" font-family="system-ui,Arial,sans-serif" font-size="5.5" font-weight="700" fill="#D4AF37" text-anchor="middle" letter-spacing="0.5">STUDENT</text>
  <text x="330" y="72" font-family="system-ui,Arial,sans-serif" font-size="5.5" font-weight="700" fill="#D4AF37" text-anchor="middle" letter-spacing="0.5">DISCOUNT</text>

  <!-- Lamp post -->
  <line x1="290" y1="90" x2="290" y2="192" stroke="#5A4A7A" stroke-width="3"/>
  <line x1="290" y1="90" x2="306" y2="90" stroke="#5A4A7A" stroke-width="3"/>
  <ellipse cx="306" cy="93" rx="7" ry="4" fill="#FFF8A0" opacity="0.8"/>
</svg>
