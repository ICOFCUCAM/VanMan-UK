<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240">
  <defs>
    <linearGradient id="sky6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4F8"/>
      <stop offset="100%" stop-color="#C8E0F0"/>
    </linearGradient>
    <linearGradient id="road6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A9AAA"/>
      <stop offset="100%" stop-color="#6A7A88"/>
    </linearGradient>
    <linearGradient id="van6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2463"/>
      <stop offset="100%" stop-color="#061539"/>
    </linearGradient>
    <linearGradient id="card6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4F8"/>
    </linearGradient>
    <linearGradient id="motorway" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6A8AAA"/>
      <stop offset="100%" stop-color="#8AAAC8"/>
    </linearGradient>
  </defs>

  <!-- Clear blue sky -->
  <rect width="360" height="240" fill="url(#sky6)"/>

  <!-- Fluffy white clouds -->
  <ellipse cx="55" cy="38" rx="32" ry="14" fill="white" opacity="0.9"/>
  <ellipse cx="82" cy="30" rx="24" ry="13" fill="white" opacity="0.9"/>
  <ellipse cx="30" cy="44" rx="18" ry="9" fill="white" opacity="0.8"/>

  <ellipse cx="260" cy="42" rx="28" ry="12" fill="white" opacity="0.85"/>
  <ellipse cx="285" cy="35" rx="20" ry="11" fill="white" opacity="0.85"/>

  <!-- Motorway in distance (perspective) -->
  <polygon points="100,140 260,140 360,200 0,200" fill="#9AACBC" opacity="0.4"/>

  <!-- Green countryside -->
  <rect x="0" y="188" width="360" height="52" fill="#7CB87A"/>
  <!-- Rolling hills -->
  <ellipse cx="300" cy="190" rx="80" ry="25" fill="#6AAA68" opacity="0.7"/>
  <ellipse cx="80" cy="192" rx="70" ry="20" fill="#7AB878" opacity="0.6"/>

  <!-- Road/motorway -->
  <rect x="0" y="178" width="360" height="20" fill="url(#road6)"/>
  <rect x="0" y="178" width="360" height="2.5" fill="#7A8A98"/>
  <!-- Road markings -->
  <rect x="20" y="186" width="28" height="4" fill="white" opacity="0.5"/>
  <rect x="60" y="186" width="28" height="4" fill="white" opacity="0.5"/>
  <rect x="100" y="186" width="28" height="4" fill="white" opacity="0.5"/>
  <rect x="140" y="186" width="28" height="4" fill="white" opacity="0.5"/>
  <rect x="180" y="186" width="28" height="4" fill="white" opacity="0.5"/>
  <rect x="220" y="186" width="28" height="4" fill="white" opacity="0.5"/>
  <rect x="260" y="186" width="28" height="4" fill="white" opacity="0.5"/>
  <rect x="310" y="186" width="28" height="4" fill="white" opacity="0.5"/>

  <!-- Trees along road -->
  <rect x="0" y="168" width="4" height="22" fill="#6B4520"/>
  <ellipse cx="2" cy="162" rx="10" ry="12" fill="#4A8A48"/>
  <rect x="355" y="165" width="4" height="25" fill="#6B4520"/>
  <ellipse cx="357" cy="158" rx="10" ry="13" fill="#4A8A48"/>

  <!-- === FLOATING SCHEDULE CARD (premium overlay) === -->
  <!-- Card shadow -->
  <rect x="195" y="38" width="150" height="135" rx="12" fill="#0A2463" opacity="0.15"/>
  <!-- Card body -->
  <rect x="193" y="36" width="150" height="135" rx="12" fill="url(#card6)"/>
  <!-- Card header -->
  <rect x="193" y="36" width="150" height="38" rx="12" fill="#0A2463"/>
  <rect x="193" y="55" width="150" height="19" fill="#0A2463"/>
  <!-- Calendar icon in header -->
  <rect x="202" y="43" width="18" height="18" rx="3" fill="white" opacity="0.15"/>
  <rect x="202" y="43" width="18" height="5" rx="2" fill="white" opacity="0.2"/>
  <line x1="208" y1="40" x2="208" y2="48" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="214" y1="40" x2="214" y2="48" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <text x="226" y="52" font-family="system-ui,Arial,sans-serif" font-size="7.5" font-weight="800" fill="white" letter-spacing="0.3">SCHEDULE</text>
  <text x="226" y="64" font-family="system-ui,Arial,sans-serif" font-size="5.5" fill="#D4AF37" letter-spacing="0.3">Upcoming Bookings</text>

  <!-- Schedule entries -->
  <!-- Entry 1 (today - highlighted) -->
  <rect x="200" y="79" width="135" height="24" rx="6" fill="#0A2463" opacity="0.06"/>
  <rect x="200" y="79" width="4" height="24" rx="2" fill="#D4AF37"/>
  <text x="210" y="89" font-family="system-ui,Arial,sans-serif" font-size="6" font-weight="700" fill="#0A2463">Today, 09:00</text>
  <text x="210" y="99" font-family="system-ui,Arial,sans-serif" font-size="5.5" fill="#6A7A8A">London → Manchester</text>
  <rect x="298" y="83" width="32" height="12" rx="5" fill="#D4AF37" opacity="0.9"/>
  <text x="314" y="91" font-family="system-ui,Arial,sans-serif" font-size="5" font-weight="700" fill="#061539" text-anchor="middle">ACTIVE</text>

  <!-- Entry 2 -->
  <rect x="200" y="107" width="135" height="22" rx="6" fill="#F8F9FA"/>
  <rect x="200" y="107" width="4" height="22" rx="2" fill="#4A9A78"/>
  <text x="210" y="117" font-family="system-ui,Arial,sans-serif" font-size="6" font-weight="600" fill="#0A2463">Wed, 14:30</text>
  <text x="210" y="125" font-family="system-ui,Arial,sans-serif" font-size="5.5" fill="#8A9AAA">Birmingham → Bristol</text>

  <!-- Entry 3 -->
  <rect x="200" y="133" width="135" height="22" rx="6" fill="#F8F9FA"/>
  <rect x="200" y="133" width="4" height="22" rx="2" fill="#4A78AA"/>
  <text x="210" y="143" font-family="system-ui,Arial,sans-serif" font-size="6" font-weight="600" fill="#0A2463">Fri, 10:00</text>
  <text x="210" y="151" font-family="system-ui,Arial,sans-serif" font-size="5.5" fill="#8A9AAA">Edinburgh → Glasgow</text>

  <!-- Add button -->
  <rect x="200" y="159" width="135" height="7" rx="3.5" fill="#0A2463" opacity="0.08"/>
  <text x="267" y="164" font-family="system-ui,Arial,sans-serif" font-size="5" fill="#0A2463" text-anchor="middle" opacity="0.6">+ Add booking</text>

  <!-- === VAN ON ROAD === -->
  <rect x="18" y="148" width="125" height="42" rx="3" fill="url(#van6)"/>
  <rect x="116" y="154" width="33" height="36" rx="3" fill="#0E2E7A"/>
  <!-- Windscreen -->
  <rect x="119" y="158" width="26" height="17" rx="2" fill="#7AAAC8" opacity="0.85"/>
  <line x1="132" y1="158" x2="132" y2="175" stroke="#6A9AB8" stroke-width="0.8"/>
  <!-- Gold stripe -->
  <rect x="18" y="162" width="125" height="5" fill="#D4AF37" opacity="0.95"/>
  <text x="70" y="158" font-family="system-ui,Arial,sans-serif" font-size="7" font-weight="800" fill="#D4AF37" text-anchor="middle" letter-spacing="0.4">FAST MAN &amp; VAN</text>

  <!-- GPS/nav device on dash -->
  <rect x="123" y="163" width="12" height="9" rx="2" fill="#1A3A6A"/>
  <rect x="124" y="164" width="10" height="7" rx="1" fill="#2A5A9A" opacity="0.8"/>
  <!-- Route line on nav -->
  <polyline points="125,167 127,166 129,168 131,165 133,166" stroke="#D4AF37" stroke-width="0.8" fill="none"/>

  <!-- Van rear door -->
  <line x1="65" y1="148" x2="65" y2="190" stroke="#1B3A8C" stroke-width="1.5"/>
  <line x1="18" y1="169" x2="116" y2="169" stroke="#1B3A8C" stroke-width="1"/>

  <!-- Wheels -->
  <circle cx="42" cy="193" r="13" fill="#1A1A2E"/>
  <circle cx="42" cy="193" r="8.5" fill="#2A2A4E"/>
  <circle cx="42" cy="193" r="4" fill="#D4AF37"/>
  <circle cx="103" cy="193" r="13" fill="#1A1A2E"/>
  <circle cx="103" cy="193" r="8.5" fill="#2A2A4E"/>
  <circle cx="103" cy="193" r="4" fill="#D4AF37"/>

  <!-- Route markers along road -->
  <!-- Pin 1 (origin) -->
  <circle cx="158" cy="183" r="6" fill="#0A2463"/>
  <circle cx="158" cy="183" r="3.5" fill="white"/>
  <!-- Pin 2 (destination) -->
  <circle cx="185" cy="183" r="6" fill="#D4AF37"/>
  <circle cx="185" cy="183" r="3.5" fill="white"/>
  <!-- Route line -->
  <line x1="164" y1="183" x2="179" y2="183" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- UK Map outline (subtle, right background) -->
  <path d="M170,50 Q165,55 168,65 Q172,72 170,80 Q168,88 175,95 Q180,100 178,108 Q175,115 180,120 Q185,125 183,130" stroke="#B8C8D8" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
