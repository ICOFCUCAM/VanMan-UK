<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A6E"/>
      <stop offset="60%" stop-color="#2D5FA8"/>
      <stop offset="100%" stop-color="#4A7FC0"/>
    </linearGradient>
    <linearGradient id="bldg1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A4F8E"/>
      <stop offset="100%" stop-color="#3A5FA0"/>
    </linearGradient>
    <linearGradient id="bldg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3D78"/>
      <stop offset="100%" stop-color="#2A4F8E"/>
    </linearGradient>
    <linearGradient id="pavement2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A9AAA"/>
      <stop offset="100%" stop-color="#6A7A8A"/>
    </linearGradient>
    <linearGradient id="van2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2463"/>
      <stop offset="100%" stop-color="#061539"/>
    </linearGradient>
  </defs>

  <!-- City dusk sky -->
  <rect width="360" height="240" fill="url(#sky2)"/>

  <!-- Background city buildings (silhouette) -->
  <rect x="0" y="80" width="40" height="120" fill="#152A55" opacity="0.7"/>
  <rect x="30" y="60" width="30" height="140" fill="#1A3468" opacity="0.7"/>
  <rect x="290" y="70" width="35" height="130" fill="#152A55" opacity="0.7"/>
  <rect x="315" y="50" width="45" height="150" fill="#1A3468" opacity="0.7"/>

  <!-- Background building lights (windows) -->
  <g fill="#D4AF37" opacity="0.5">
    <rect x="5" y="88" width="6" height="4"/>
    <rect x="15" y="88" width="6" height="4"/>
    <rect x="5" y="98" width="6" height="4"/>
    <rect x="15" y="106" width="6" height="4"/>
    <rect x="35" y="68" width="5" height="4"/>
    <rect x="45" y="68" width="5" height="4"/>
    <rect x="35" y="80" width="5" height="4"/>
    <rect x="45" y="80" width="5" height="4"/>
    <rect x="295" y="78" width="5" height="4"/>
    <rect x="305" y="85" width="5" height="4"/>
    <rect x="320" y="58" width="5" height="4"/>
    <rect x="330" y="65" width="5" height="4"/>
    <rect x="340" y="58" width="5" height="4"/>
    <rect x="330" y="80" width="5" height="4"/>
    <rect x="340" y="75" width="5" height="4"/>
  </g>

  <!-- Pavement/road -->
  <rect x="0" y="192" width="360" height="48" fill="url(#pavement2)"/>
  <rect x="0" y="192" width="360" height="3" fill="#7A8A9A"/>
  <!-- Road markings -->
  <rect x="0" y="212" width="30" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="40" y="212" width="30" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="80" y="212" width="30" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="280" y="212" width="30" height="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="320" y="212" width="30" height="4" fill="#FFFFFF" opacity="0.5"/>

  <!-- === MAIN OFFICE BUILDING === -->
  <rect x="130" y="30" width="100" height="165" fill="url(#bldg1)"/>
  <rect x="225" y="30" width="15" height="165" fill="url(#bldg2)"/>

  <!-- Glass curtain wall effect -->
  <g opacity="0.4">
    <line x1="145" y1="30" x2="145" y2="195" stroke="#5A80C0" stroke-width="1"/>
    <line x1="162" y1="30" x2="162" y2="195" stroke="#5A80C0" stroke-width="1"/>
    <line x1="179" y1="30" x2="179" y2="195" stroke="#5A80C0" stroke-width="1"/>
    <line x1="196" y1="30" x2="196" y2="195" stroke="#5A80C0" stroke-width="1"/>
    <line x1="213" y1="30" x2="213" y2="195" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="45" x2="225" y2="45" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="60" x2="225" y2="60" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="75" x2="225" y2="75" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="90" x2="225" y2="90" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="105" x2="225" y2="105" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="120" x2="225" y2="120" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="135" x2="225" y2="135" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="150" x2="225" y2="150" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="165" x2="225" y2="165" stroke="#5A80C0" stroke-width="1"/>
    <line x1="130" y1="180" x2="225" y2="180" stroke="#5A80C0" stroke-width="1"/>
  </g>

  <!-- Office windows (lit up) -->
  <g fill="#FFE090" opacity="0.85">
    <rect x="133" y="47" width="10" height="11"/>
    <rect x="148" y="47" width="10" height="11"/>
    <rect x="165" y="47" width="10" height="11"/>
    <rect x="200" y="47" width="10" height="11"/>
    <rect x="215" y="47" width="7" height="11"/>
    <rect x="133" y="62" width="10" height="11"/>
    <rect x="165" y="62" width="10" height="11"/>
    <rect x="182" y="62" width="10" height="11"/>
    <rect x="200" y="62" width="10" height="11"/>
    <rect x="148" y="77" width="10" height="11"/>
    <rect x="182" y="77" width="10" height="11"/>
    <rect x="215" y="77" width="7" height="11"/>
    <rect x="133" y="92" width="10" height="11"/>
    <rect x="165" y="92" width="10" height="11"/>
    <rect x="200" y="92" width="10" height="11"/>
    <rect x="148" y="107" width="10" height="11"/>
    <rect x="182" y="107" width="10" height="11"/>
    <rect x="215" y="107" width="7" height="11"/>
    <rect x="133" y="122" width="10" height="11"/>
    <rect x="165" y="122" width="10" height="11"/>
    <rect x="200" y="122" width="10" height="11"/>
  </g>

  <!-- Blue glass reflection -->
  <rect x="130" y="30" width="50" height="165" fill="#7AAAD0" opacity="0.08"/>

  <!-- Building entrance -->
  <rect x="163" y="172" width="34" height="23" rx="2" fill="#3A6A9A" opacity="0.9"/>
  <rect x="165" y="174" width="14" height="21" rx="1" fill="#6A9AC0" opacity="0.7"/>
  <rect x="181" y="174" width="14" height="21" rx="1" fill="#6A9AC0" opacity="0.7"/>
  <rect x="150" y="170" width="60" height="5" rx="1" fill="#1A3468"/>

  <!-- Building sign -->
  <rect x="145" y="155" width="65" height="13" rx="2" fill="#0A2463"/>
  <text x="177" y="164" font-family="system-ui,Arial,sans-serif" font-size="6" font-weight="700" fill="#D4AF37" text-anchor="middle" letter-spacing="0.3">CORPORATE HOUSE</text>

  <!-- === MOVING VAN === -->
  <rect x="15" y="152" width="110" height="45" rx="3" fill="url(#van2)"/>
  <rect x="100" y="160" width="30" height="37" rx="2" fill="#0E2E7A"/>
  <rect x="103" y="163" width="24" height="16" rx="2" fill="#6A9AC0" opacity="0.8"/>
  <rect x="15" y="165" width="110" height="5" fill="#D4AF37" opacity="0.95"/>
  <text x="60" y="162" font-family="system-ui,Arial,sans-serif" font-size="6.5" font-weight="800" fill="#D4AF37" text-anchor="middle" letter-spacing="0.4">FAST MAN &amp; VAN</text>
  <line x1="55" y1="152" x2="55" y2="197" stroke="#1B3A8C" stroke-width="1.5"/>
  <line x1="15" y1="174" x2="100" y2="174" stroke="#1B3A8C" stroke-width="1"/>
  <circle cx="38" cy="200" r="12" fill="#1A1A2E"/>
  <circle cx="38" cy="200" r="7.5" fill="#2A2A4E"/>
  <circle cx="38" cy="200" r="3.5" fill="#D4AF37"/>
  <circle cx="98" cy="200" r="12" fill="#1A1A2E"/>
  <circle cx="98" cy="200" r="7.5" fill="#2A2A4E"/>
  <circle cx="98" cy="200" r="3.5" fill="#D4AF37"/>

  <!-- Office equipment boxes on pavement -->
  <rect x="130" y="162" width="22" height="18" rx="1" fill="#D4C8A0"/>
  <rect x="130" y="162" width="22" height="18" rx="1" fill="none" stroke="#B8A880" stroke-width="1"/>
  <text x="141" y="172" font-family="system-ui,sans-serif" font-size="4" fill="#8A7840" text-anchor="middle">FRAGILE</text>
  <rect x="133" y="179" width="25" height="16" rx="1" fill="#C8B890"/>
  <rect x="158" y="170" width="15" height="12" rx="1" fill="#D4B870"/>

  <!-- People silhouettes -->
  <circle cx="248" cy="162" r="6" fill="#4A3020"/>
  <rect x="244" y="168" width="8" height="16" rx="1" fill="#1B3A8C"/>
  <rect x="240" y="170" width="14" height="10" rx="1" fill="#C8A860"/>
  <line x1="244" y1="170" x2="240" y2="175" stroke="#4A3020" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="252" y1="170" x2="254" y2="175" stroke="#4A3020" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="270" cy="165" r="5.5" fill="#6A4A30"/>
  <rect x="266" y="171" width="8" height="15" rx="1" fill="#8B4513"/>

  <!-- Street lamp -->
  <line x1="330" y1="100" x2="330" y2="195" stroke="#4A5A6A" stroke-width="3"/>
  <line x1="330" y1="100" x2="346" y2="100" stroke="#4A5A6A" stroke-width="3"/>
  <ellipse cx="346" cy="103" rx="8" ry="5" fill="#FFE090" opacity="0.9"/>
  <ellipse cx="346" cy="103" rx="5" ry="3" fill="white" opacity="0.7"/>
</svg>
